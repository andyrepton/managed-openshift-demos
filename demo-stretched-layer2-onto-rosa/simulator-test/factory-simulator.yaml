apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: allow-simulator-to-pull
  namespace: industrial-network
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
- kind: ServiceAccount
  name: simulator-admin
  namespace: factory-simulator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: simulator-admin
  namespace: factory-simulator
---
# Grant Privileged access for network management
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: simulator-privileged-binding
  namespace: factory-simulator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: simulator-admin
  namespace: factory-simulator
---
apiVersion: v1
kind: Secret
metadata:
  name: simulator-vpn-config
  namespace: factory-simulator
type: Opaque
stringData:
  server.conf: |
    dev tap
    proto udp
    port 1194
    # Point to where we will mount the certs secret
    ca /etc/openvpn/certs/ca.crt
    cert /etc/openvpn/certs/server.crt
    key /etc/openvpn/certs/server.key
    dh /etc/openvpn/certs/dh.pem
    
    server-bridge 192.168.100.1 255.255.255.0 192.168.100.10 192.168.100.20
    keepalive 10 120
    cipher AES-256-GCM
    persist-key
    persist-tun
    
    # Writeable paths
    status /tmp/openvpn-status.log
    ifconfig-pool-persist /tmp/ipp.txt
    verb 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-server-simulator
  namespace: factory-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vpn-server
  template:
    metadata:
      labels:
        app: vpn-server
    spec:
      serviceAccountName: simulator-admin
      containers:
      - name: vpn-server
        image: image-registry.openshift-image-registry.svc:5000/industrial-network/industrial-networking-tools:latest
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. Start OpenVPN in Daemon Mode
            echo "--- STARTING OPENVPN (DAEMON) ---"
            openvpn --config /etc/openvpn/config/server.conf --daemon

            # 2. Wait for tap0 to exist (Sequential)
            echo "--- WAITING FOR tap0 ---"
            MAX_RETRIES=30
            COUNT=0
            while [ $COUNT -lt $MAX_RETRIES ]; do
              if ip link show tap0 >/dev/null 2>&1; then
                echo "--- tap0 DETECTED ---"
                break
              fi
              sleep 1
               COUNT=$((COUNT+1))
            done

            # 3. Setup Bridge and Plug in tap0
            echo "--- CONFIGURING BRIDGE ---"
            ip link add br-hub type bridge 2>/dev/null || true
            ip link set br-hub up
    
            # Ensure IP is set
            ip addr add 192.168.100.1/24 dev br-hub 2>/dev/null || true
    
            # Connect tap0
            ip link set tap0 master br-hub
            ip link set tap0 up
            ip link set tap0 promisc on

            echo "--- SIMULATOR READY (L2 LINK ACTIVE) ---"
    
            # 4. Keep container alive and stream logs
            tail -f /dev/null
        volumeMounts:
        - name: vpn-certs
          mountPath: /etc/openvpn/certs
          readOnly: true
        - name: vpn-config
          mountPath: /etc/openvpn/config
          readOnly: true
      volumes:
      - name: vpn-certs
        secret:
          secretName: simulator-vpn-server-auth
      - name: vpn-config
        secret:
          secretName: simulator-vpn-config
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-server-svc
  namespace: factory-simulator
spec:
  selector:
    app: vpn-server
  ports:
    - protocol: UDP
      port: 1194
      targetPort: 1194
  type: ClusterIP
