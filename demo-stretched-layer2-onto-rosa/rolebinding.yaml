apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: industrial-privileged-binding
  namespace: industrial-network
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
- kind: ServiceAccount
  name: industrial-admin
  namespace: industrial-network
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: industrial-admin-api-access
  namespace: industrial-network
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader
subjects:
- kind: ServiceAccount
  name: industrial-admin
  namespace: industrial-network
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: industrial-network
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
